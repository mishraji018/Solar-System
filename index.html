<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos Explorer | Solar System Simulation</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <!-- Three.js Import Map -->
  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-content">
      <div class="spinner"></div>
      <h1>COSMOS</h1>
      <p id="loading-status">INITIALIZING PROBE...</p>
    </div>
  </div>

  <!-- Main Canvas -->
  <div id="canvas-container"></div>

  <!-- HUD / UI Interface -->
  <div id="ui-overlay">
    <header class="glass-panel top-bar">
      <div class="brand">
        <span class="logo">COSMOS</span>
        <span class="version">v2.0</span>
      </div>
      <div class="mission-status">
        <span class="status-dot"></span>
        SYSTEMS ONLINE
      </div>
    </header>

    <main class="ui-grid">
      <!-- Planet Information -->
      <section id="info-panel" class="glass-panel">
        <div class="panel-header">
          <h2 id="planet-name">THE SUN</h2>
          <span class="tag">TARGET</span>
        </div>
        <p id="planet-description">The star at the heart of our Solar System.</p>
        <div class="stats-grid">
          <div class="stat">
            <span class="label">DISTANCE</span>
            <span class="value" id="stat-dist">0 AU</span>
          </div>
          <div class="stat">
            <span class="label">DIAMETER</span>
            <span class="value" id="stat-diam">1.39M km</span>
          </div>
        </div>
      </section>

      <!-- Simulation Controls -->
      <section id="controls-panel" class="glass-panel">
        <h3>SIMULATION</h3>
        <div class="control-row">
          <label>WARP SPEED</label>
          <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
        </div>
        <div class="btn-group">
          <button id="play-pause-btn" class="glass-btn">PAUSE</button>
          <button id="reset-cam-btn" class="glass-btn">RESET</button>
        </div>
        <div class="selector-container">
          <label>SYSTEM TARGETS</label>
          <div id="planet-selector" class="grid-selector">
            <!-- Filled by JS -->
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>

</html>
