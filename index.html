<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solaris | Cinematic 3D Solar System</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="canvas-container"></div>

  <!-- UI Overlay -->
  <div id="ui-container">
    <!-- Top Navigation -->
    <header class="nasa-header">
      <div class="logo">SOLARIS</div>
      <div class="mission-status">
        <span class="pulse"></span> EXTERNAL FEED: MISSION START
      </div>
    </header>

    <!-- Bottom Planet Info Panel -->
    <div id="planet-info" class="glass-panel info-panel">
      <div class="panel-header">
        <h1 id="planet-name">Sun</h1>
        <span class="coord-tag">Target Locked</span>
      </div>
      <p id="planet-description">The Star at the center of the Solar System.</p>
      <div class="stats">
        <div class="stat-item"><span class="label">Rel. Distance</span> <span id="orbit-dist" class="value">0 AU</span>
        </div>
        <div class="stat-item"><span class="label">Diameter</span> <span id="diameter" class="value">1.39M km</span>
        </div>
        <div class="stat-item"><span class="label">Orbit Velocity</span> <span id="velocity" class="value">0 km/s</span>
        </div>
      </div>
    </div>

    <!-- Right Side Control Panel -->
    <div class="glass-panel controls-panel">
      <h3>SIMULATION CONTROLS</h3>

      <div class="control-group">
        <label>Time Compression</label>
        <input type="range" id="speed-slider" min="0" max="10" step="0.1" value="1">
      </div>

      <div class="button-grid">
        <button id="play-pause-btn" class="nasa-btn">PAUSE</button>
        <button id="reset-cam-btn" class="nasa-btn">RESET CAMERA</button>
        <button id="toggle-orbits-btn" class="nasa-btn">TOGGLE ORBITS</button>
      </div>

      <div class="planet-selector">
        <h3>TARGET SYSTEMS</h3>
        <div class="selector-grid" id="planet-list">
          <!-- Planet buttons will be generated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader"></div>
      <div class="loader-text">
        <h2>SOLARIS ENGINE</h2>
        <p id="loading-status">Synchronizing Celestial Matrices...</p>
        <div class="progress-bar">
          <div id="progress-inner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Import Map for Three.js -->
  <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
  <script type="module" src="script.js"></script>
</body>

</html>
